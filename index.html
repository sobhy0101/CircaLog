<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- FOUC prevention: reads the saved theme from localStorage and adds `.dark` to <html> before React renders, ensuring zero flash on first load.
         The key string 'circalog-theme' is defined as THEME_KEY in src/hooks/useTheme.ts — if it ever changes, update it there and here together. -->
    <script>
      (function () {
        if (localStorage.getItem('circalog-theme') !== 'light') {
          document.documentElement.classList.add('dark');
        }
      }());
    </script>

    <!-- Favicon: SVG (modern browsers, auto-adapts to light/dark if authored that way) -->
    <link rel="icon" type="image/svg+xml" href="/images/brand/icons/favicon.svg?v=20260609" />
    <!-- Favicon: PNG fallback for browsers that don't support SVG favicons -->
    <link rel="icon" type="image/png" sizes="96x96" href="/images/brand/icons/favicon-96x96.png?v=20260609" />
    <!-- Favicon: ICO legacy fallback (older browsers, RSS readers) -->
    <link rel="shortcut icon" href="/favicon.ico?v=20260609" />
    <!-- Apple Touch Icon: used by iOS Safari for bookmarks and Add to Home Screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/images/brand/icons/apple-touch-icon.png?v=20260609" />

    <!-- Tells mobile browsers to use the device's full width and prevent auto-zoom. Critical for any mobile-first PWA. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title shown in browser tab and in the OS app switcher -->
    <title>CircaLog</title>

    <!-- PWA: color of the browser/OS chrome surrounding the app on Android -->
    <meta name="theme-color" content="#0F0F1E" />

    <!-- PWA: tells browsers to allow "Add to Home Screen" as a full-screen app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- PWA: sets the iOS status bar style when running as a home screen app -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA: the name shown below the app icon on iOS home screens -->
    <meta name="apple-mobile-web-app-title" content="CircaLog" />

    <!-- vite-plugin-pwa injects the manifest link automatically during build. The line below is a fallback for environments that don't use the plugin. -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- PWA: iOS splash screens (apple-touch-startup-image).
         iOS Safari ignores the Web App Manifest for splash screens entirely —
         it requires a separate <link> tag for every device resolution.
         All PNGs were exported from a single 2732×2732 master in Illustrator.
         The media queries match each device's CSS width × height × pixel ratio.
         Only applies when the PWA is launched from the iOS home screen. -->

    <!-- iPhone 16 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1320x2868.png" />
    <!-- iPhone 16 Pro -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1206x2622.png" />
    <!-- iPhone 16 Plus / 15 Plus / 15 Pro Max / 14 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1290x2796.png" />
    <!-- iPhone 16 / 15 / 15 Pro / 14 Pro -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1179x2556.png" />
    <!-- iPhone 14 Plus / 13 Pro Max / 12 Pro Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1284x2778.png" />
    <!-- iPhone 14 / 13 / 13 Pro / 12 / 12 Pro -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1170x2532.png" />
    <!-- iPhone 13 mini / 12 mini / 11 Pro / XS / X -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1125x2436.png" />
    <!-- iPhone 11 Pro Max / XS Max -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1242x2688.png" />
    <!-- iPhone 11 / XR -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="/images/brand/splash/splash-828x1792.png" />
    <!-- iPhone 8 Plus / 7 Plus / 6s Plus -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="/images/brand/splash/splash-1242x2208.png" />
    <!-- iPhone 8 / 7 / 6s / SE 2nd & 3rd gen -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="/images/brand/splash/splash-750x1334.png" />
    <!-- iPad Pro 12.9" (all generations) -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="/images/brand/splash/splash-2048x2732.png" />
    <!-- iPad Pro 11" / iPad Air 4 & 5 -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" href="/images/brand/splash/splash-1668x2388.png" />
    <!-- iPad Air 3 / iPad Pro 10.5" -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 834px) and (device-height: 1112px) and (-webkit-device-pixel-ratio: 2)" href="/images/brand/splash/splash-1668x2224.png" />
    <!-- iPad mini 5 & 6 / iPad 7–10th gen -->
    <link rel="apple-touch-startup-image" media="screen and (device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" href="/images/brand/splash/splash-1536x2048.png" />

    <!-- Google Fonts: preconnect hints tell the browser to open the DNS+TLS connections to Google's font servers before the stylesheet is parsed, shaving ~100–300 ms off the first font request on cold loads.
         The second preconnect (fonts.gstatic.com) is where the actual font files are served — both hints are needed. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Exo 2 (variable: wght 100–900, upright + italic)
         Used for: logo wordmark, headings, section titles, key data callouts -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100..900;1,100..900&display=swap"
    />

    <!-- Inter (variable: wght 100..900, optical sizing)
         Used for: all body text, inputs, labels, navigation, secondary UI copy -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
