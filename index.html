<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- FOUC prevention: reads the saved theme from localStorage and adds .dark
         to <html> before React renders, ensuring zero flash on first load.
         'circalog-theme' is the canonical key — the useTheme hook must match it. -->
    <script>
      (function () {
        if (localStorage.getItem('circalog-theme') !== 'light') {
          document.documentElement.classList.add('dark');
        }
      }());
    </script>

    <!-- Favicon: SVG (modern browsers, auto-adapts to light/dark if authored that way) -->
    <link rel="icon" type="image/svg+xml" href="/images/brand/favicon.svg?v=20260528" />
    <!-- Favicon: PNG fallback for browsers that don't support SVG favicons -->
    <link rel="icon" type="image/png" sizes="96x96" href="/images/brand/favicon-96x96.png?v=20260528" />
    <!-- Favicon: ICO legacy fallback (older browsers, RSS readers) -->
    <link rel="shortcut icon" href="/images/brand/favicon.ico?v=20260528" />
    <!-- Apple Touch Icon: used by iOS Safari for bookmarks and Add to Home Screen -->
    <link rel="apple-touch-icon" sizes="180x180" href="/images/brand/apple-touch-icon.png?v=20260528" />

    <!-- Tells mobile browsers to use the device's full width and prevent auto-zoom. Critical for any mobile-first PWA. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Page title shown in browser tab and in the OS app switcher -->
    <title>CircaLog</title>

    <!-- PWA: color of the browser/OS chrome surrounding the app on Android -->
    <meta name="theme-color" content="#0F0F1E" />

    <!-- PWA: tells browsers to allow "Add to Home Screen" as a full-screen app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <!-- PWA: sets the iOS status bar style when running as a home screen app -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- PWA: the name shown below the app icon on iOS home screens -->
    <meta name="apple-mobile-web-app-title" content="CircaLog" />

    <!-- vite-plugin-pwa injects the manifest link automatically during build. The line below is a fallback for environments that don't use the plugin. -->
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
